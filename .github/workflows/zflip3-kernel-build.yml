name: Build Z Flip 3 Kernel (KernelSU + DroidSpaces)

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'KernelSU branch/tag (default: main)'
        required: false
        default: 'main'
      add_droidspaces:
        description: 'Enable DroidSpaces kernel options'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  KERNEL_SOURCE: wwyman94/zflip3-kernel-source
  DEFCONFIG: vendor/b2q_chn_openx_defconfig
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            python3 \
            python3-pip \
            curl \
            cpio \
            rsync \
            zip \
            unzip \
            dwarves \
            git \
            libncurses5-dev \
            libncursesw5-dev \
            xz-utils \
            zstd \
            clang \
            lld \
            llvm

      - name: Setup toolchains
        run: |
          mkdir -p /opt/toolchains
          cd /opt/toolchains
          
          # Download AOSP Clang from GitHub mirror
          echo "Downloading AOSP Clang..."
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r487747c.git clang 2>/dev/null || \
          {
            echo "Using system clang..."
            mkdir -p clang/bin
            ln -sf $(which clang) clang/bin/clang
            ln -sf $(which clang++) clang/bin/clang++
            ln -sf $(which llvm-ar) clang/bin/llvm-ar
            ln -sf $(which llvm-nm) clang/bin/llvm-nm
            ln -sf $(which llvm-strip) clang/bin/llvm-strip
          }
          
          CLANG_BIN="/opt/toolchains/clang/bin"
          if [ -f "$CLANG_BIN/clang" ]; then
            echo "CLANG_PATH=$CLANG_BIN" >> $GITHUB_ENV
            echo "PATH=$CLANG_BIN:$PATH" >> $GITHUB_ENV
            $CLANG_BIN/clang --version
          else
            echo "Using system clang"
            echo "CLANG_PATH=/usr/bin" >> $GITHUB_ENV
            clang --version
          fi
          
          # Download AOSP GCC 4.9
          echo "Downloading AOSP GCC 4.9..."
          mkdir -p gcc
          cd gcc
          curl -L "https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/main.tar.gz" 2>/dev/null | tar -xz --strip-components=1 || \
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/main.tar.gz" 2>/dev/null | tar -xz || true
          
          cd /opt/toolchains
          
          # Setup GCC paths
          if [ -d "gcc/bin" ] && [ -f "gcc/bin/aarch64-linux-android-4.9-gcc" ]; then
            echo "CROSS_COMPILE=/opt/toolchains/gcc/bin/aarch64-linux-android-4.9-" >> $GITHUB_ENV
            echo "CROSS_COMPILE_ARM32=/opt/toolchains/gcc/bin/arm-linux-androideabi-4.9-" >> $GITHUB_ENV
          else
            echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
            echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
          fi

      - name: Clone kernel source
        run: |
          echo "Cloning kernel source from $KERNEL_SOURCE..."
          git clone --depth=1 https://github.com/${{ env.KERNEL_SOURCE }}.git kernel
          cd kernel
          
          # Fix script permissions (Windows uploaded files lack execute permission)
          echo "Fixing script permissions..."
          chmod +x scripts/*.sh 2>/dev/null || true
          chmod +x scripts/basic/fixdep 2>/dev/null || true
          
          echo "Kernel version: $(make kernelversion)"
          echo "Files: $(find . -type f | wc -l)"
          echo "Defconfig exists: $(test -f arch/arm64/configs/${{ env.DEFCONFIG }} && echo YES || echo NO)"

      - name: Integrate KernelSU
        run: |
          cd kernel
          echo "Cloning KernelSU (branch: ${{ inputs.kernelsu_version }})..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ inputs.kernelsu_version }}"
          
          echo "KernelSU files added:"
          find drivers/kernelsu -type f 2>/dev/null | head -10 || echo "drivers/kernelsu not found"

      - name: Enable DroidSpaces kernel options
        if: inputs.add_droidspaces == 'true'
        run: |
          cd kernel
          echo "Adding DroidSpaces kernel config options..."
          
          # Create a config fragment file
          mkdir -p arch/arm64/configs
          cat > arch/arm64/configs/droidspaces.config << 'EOF'
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_NAMESPACES=y
          CONFIG_PID_NS=y
          CONFIG_IPC_NS=y
          CONFIG_UTS_NS=y
          CONFIG_USER_NS=y
          CONFIG_DEVTMPFS=y
          CONFIG_DEVTMPFS_MOUNT=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_MEMCG=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_REJECT=y
          CONFIG_NETFILTER_XT_TARGET_LOG=y
          CONFIG_NETFILTER_XT_MATCH_RECENT=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_VETH=y
          CONFIG_ANDROID_BINDER_IPC=y
          CONFIG_ANDROID_BINDERFS=y
          EOF
          
          echo "DroidSpaces config fragment created"

      - name: Make defconfig
        run: |
          cd kernel
          echo "Generating kernel config..."
          
          # Determine compiler
          if [ -f "$CLANG_PATH/clang" ]; then
            CC="$CLANG_PATH/clang"
          else
            CC="clang"
          fi
          
          # First generate base config
          make ARCH=${{ env.ARCH }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CC="$CC" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            vendor/b2q_chn_openx_defconfig
          
          # Merge DroidSpaces config if enabled
          if [ "${{ inputs.add_droidspaces }}" == "true" ] && [ -f arch/arm64/configs/droidspaces.config ]; then
            echo "Merging DroidSpaces config..."
            ./scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/droidspaces.config || \
            {
              # Fallback: manually enable configs
              echo "Using fallback config method..."
              for cfg in CONFIG_SYSVIPC CONFIG_POSIX_MQUEUE CONFIG_NAMESPACES CONFIG_PID_NS CONFIG_IPC_NS CONFIG_UTS_NS CONFIG_USER_NS CONFIG_DEVTMPFS CONFIG_DEVTMPFS_MOUNT CONFIG_CGROUPS CONFIG_CGROUP_DEVICE CONFIG_CGROUP_PIDS CONFIG_MEMCG CONFIG_NETFILTER_XT_MATCH_ADDRTYPE CONFIG_NETFILTER_XT_TARGET_REJECT CONFIG_NETFILTER_XT_TARGET_LOG CONFIG_NETFILTER_XT_MATCH_RECENT CONFIG_IP_SET CONFIG_IP_SET_HASH_IP CONFIG_IP_SET_HASH_NET CONFIG_NETFILTER_XT_SET CONFIG_TMPFS_XATTR CONFIG_VETH CONFIG_ANDROID_BINDER_IPC CONFIG_ANDROID_BINDERFS; do
                if grep -q "^# $cfg is not set" .config 2>/dev/null; then
                  sed -i "s/^# $cfg is not set/$cfg=y/" .config
                elif ! grep -q "^$cfg=" .config 2>/dev/null; then
                  echo "$cfg=y" >> .config
                fi
              done
              make ARCH=${{ env.ARCH }} olddefconfig
            }
          fi
          
          echo "Verifying KernelSU config..."
          grep "KSU" .config || echo "KSU not found in config"
          echo "Verifying DroidSpaces configs..."
          grep "SYSVIPC\|IPC_NS\|CGROUPS" .config | head -5

      - name: Build kernel
        run: |
          cd kernel
          echo "Building kernel (this may take 30-60 minutes)..."
          
          # Determine compiler
          if [ -f "$CLANG_PATH/clang" ]; then
            CC="$CLANG_PATH/clang"
          else
            CC="clang"
          fi
          
          make ARCH=${{ env.ARCH }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} \
            CC="$CC" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            -j$(nproc) \
            2>&1 | tee build.log
          
          BUILD_STATUS=$?
          echo "Build exit code: $BUILD_STATUS"
          
          # Check if Image.gz-dtb exists
          if [ -f arch/arm64/boot/Image.gz ]; then
            echo "✅ Image.gz built successfully!"
            ls -la arch/arm64/boot/Image.gz
          elif [ -f arch/arm64/boot/Image.gz-dtb ]; then
            echo "✅ Image.gz-dtb built successfully!"
            ls -la arch/arm64/boot/Image.gz-dtb
          elif [ -f arch/arm64/boot/Image ]; then
            echo "✅ Image built successfully!"
            ls -la arch/arm64/boot/Image
          else
            echo "❌ Kernel image not found!"
            echo "Last 50 lines of build log:"
            tail -50 build.log
            exit 1
          fi

      - name: Package kernel
        run: |
          cd kernel
          
          # Find the kernel image
          KERNEL_IMG=""
          if [ -f arch/arm64/boot/Image.gz-dtb ]; then
            KERNEL_IMG="arch/arm64/boot/Image.gz-dtb"
          elif [ -f arch/arm64/boot/Image.gz ]; then
            KERNEL_IMG="arch/arm64/boot/Image.gz"
          elif [ -f arch/arm64/boot/Image ]; then
            KERNEL_IMG="arch/arm64/boot/Image"
          fi
          
          echo "Kernel image: $KERNEL_IMG"
          
          # Clone AnyKernel3 for packaging
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          # Copy kernel image
          cp "$KERNEL_IMG" AnyKernel3/
          
          # Edit AnyKernel3 info
          cd AnyKernel3
          sed -i "s/kernel.string=.*/kernel.string=Z Flip 3 KernelSU+DroidSpaces/" tools/ak3-core.sh 2>/dev/null || true
          sed -i "s/kernel.name=.*/kernel.name=zflip3-kernelsu-droidspaces/" tools/ak3-core.sh 2>/dev/null || true
          
          # Create zip
          zip -r9 ../zflip3-kernelsu-droidspaces.zip ./*
          cd ..
          
          echo "✅ Kernel packaged!"
          ls -la zflip3-kernelsu-droidspaces.zip

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: zflip3-kernelsu-droidspaces
          path: kernel/zflip3-kernelsu-droidspaces.zip
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log
          retention-days: 7