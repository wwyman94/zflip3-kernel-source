name: Build Z Flip 3 Kernel v15

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'KernelSU branch/tag (e.g. main, v0.9.0)'
        required: false
        default: 'main'

env:
  ARCH: arm64
  DEFCONFIG: vendor/b2q_chn_openx_defconfig

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: wwyman94/zflip3-kernel-source
          ref: main
          path: kernel
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            bc bison flex libssl-dev libelf-dev \
            python3 python3-pip curl cpio rsync zip unzip git \
            libncurses5-dev libncursesw5-dev xz-utils zstd \
            clang lld llvm

      - name: Setup toolchains
        run: |
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
          echo "KERNELVERSION=5.4.274-zflip3-kernelsu" >> $GITHUB_ENV
          clang --version
          aarch64-linux-gnu-gcc --version

      - name: Integrate KernelSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ inputs.kernelsu_version }}"
          echo "KernelSU integrated"

      - name: Make defconfig
        run: |
          cd kernel
          chmod +x scripts/*.sh scripts/basic/fixdep 2>/dev/null || true
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} ${{ env.DEFCONFIG }}

      - name: Configure kernel (disable WALT, enable namespaces)
        run: |
          cd kernel
          
          # Disable WALT completely to bypass ftrace/trace.h issue
          # WALT is a scheduler feature not required for Android
          echo "Disabling WALT to bypass ftrace trace.h compilation issue..."
          
          # Disable WALT and ftrace-dependent features
          cat >> .config << 'EOF'
# Disable WALT to avoid ftrace trace.h compilation errors
CONFIG_SCHED_WALT=n
CONFIG_WALT=n
CONFIG_HAVE_SCHED_WALT=n
CONFIG_CPU_ISOLATION=n
# Ensure basic tracing still works minimally
CONFIG_TRACING=n
CONFIG_FTRACE=n
EOF
          
          # Also explicitly disable WALT-related configs
          for cfg in CONFIG_SCHED_WALT CONFIG_WALT CONFIG_HAVE_SCHED_WALT CONFIG_CPU_FREQ_TIMES CONFIG_UCLAMP_TASK; do
            grep -q "^$cfg=" .config && sed -i "s/^$cfg=.*/$cfg=n/" .config || true
          done
          
          # Enable namespace configs required by DroidSpaces + Android 15
          cat >> .config << 'EOF'
CONFIG_SYSVIPC=y
CONFIG_POSIX_MQUEUE=y
CONFIG_NAMESPACES=y
CONFIG_UTS_NS=y
CONFIG_USER_NS=y
CONFIG_PID_NS=y
CONFIG_IPC_NS=y
CONFIG_NET_NS=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_CGROUPS=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_SCHED=y
CONFIG_CPUSETS=y
CONFIG_MEMCG=y
CONFIG_VETH=y
CONFIG_BRIDGE=y
CONFIG_NF_NAT=y
CONFIG_IP_NF_IPTABLES=y
CONFIG_IP_NF_FILTER=y
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
CONFIG_IPV6=y
CONFIG_IPV6_MIP6=y
CONFIG_IPV6_NDISC_NODETYPE=y
CONFIG_UNIX=y
CONFIG_SYSVIPC_SYSCTL=y
CONFIG_POSIX_SYSCTLS=y
CONFIG_FUTEX=y
CONFIG_ANDROID_BINDER_IPC=y
CONFIG_ANDROID_BINDERFS=y
CONFIG_OVERLAY_FS=y
CONFIG_EXT4_FS=y
CONFIG_EXT4_FS_POSIX_ACL=y
CONFIG_EXT4_FS_SECURITY=y
CONFIG_VFAT_FS=y
CONFIG_NTFS_FS=y
CONFIG_NTFS_RW=y
CONFIG_F2FS_FS=y
CONFIG_QUOTA=y
CONFIG_QUOTA_NETLINK_INTERFACE=y
CONFIG_PRINT_QUOTA_WARNING=y
CONFIG_AUTOFS4_FS=y
CONFIG_ISO9660_FS=y
CONFIG_MSDOS_FS=y
CONFIG_VFAT_FS_CODEPAGE_936=y
CONFIG_FAT_DEFAULT_CODEPAGE=936
CONFIG_FAT_DEFAULT_IOCHARSET=gb2312
EOF
          
          # Remove duplicates and clean up
          sort .config | uniq > .config.tmp
          mv .config.tmp .config
          
          # Run olddefconfig to resolve dependencies (non-interactive)
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} olddefconfig
          
          # Verify WALT is disabled
          echo "=== Checking WALT status ==="
          grep -E "^CONFIG_SCHED_WALT|^CONFIG_WALT" .config || echo "WALT not in config (good)"
          echo "=== Checking namespace configs ==="
          grep -E "^CONFIG_USER_NS|^CONFIG_PID_NS|^CONFIG_NET_NS" .config

      - name: Build kernel
        id: build
        run: |
          cd kernel
          echo "=== Build started at $(date) ==="
          
          set -o pipefail
          
          make ARCH=${{ env.ARCH }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} \
            -j$(nproc) 2>&1 | tee build.log
          
          BUILD_STATUS=$?
          echo ""
          echo "=== Build finished at $(date), exit code: $BUILD_STATUS ==="
          
          echo ""
          echo "=== Checking for kernel images ==="
          find arch/arm64/boot -name "Image*" -type f 2>/dev/null && ls -la arch/arm64/boot/
          find . -name "Image.gz-dtb" -type f 2>/dev/null && echo "Found Image.gz-dtb"
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo ""
            echo "=== Build FAILED - last 200 lines of log ==="
            tail -200 build.log
            exit 1
          fi

      - name: Find kernel image
        id: kernel_image
        run: |
          cd kernel
          KERNEL_IMG=""
          for img in arch/arm64/boot/Image.gz-dtb arch/arm64/boot/Image.gz arch/arm64/boot/Image; do
            if [ -f "$img" ]; then
              KERNEL_IMG="$img"
              echo "Found kernel image: $KERNEL_IMG"
              ls -lh "$KERNEL_IMG"
              break
            fi
          done
          
          if [ -z "$KERNEL_IMG" ]; then
            echo "ERROR: No kernel image found!"
            ls -la arch/arm64/boot/
            exit 1
          fi
          
          echo "KERNEL_IMG=$KERNEL_IMG" >> $GITHUB_ENV

      - name: Package kernel with AnyKernel3
        if: success()
        run: |
          cd kernel
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp "$KERNEL_IMG" AnyKernel3/
          
          # Create zImage symlink if needed
          cd AnyKernel3
          if [ ! -f zImage ] && [ -f Image.gz-dtb ]; then
            ln -sf Image.gz-dtb zImage
          elif [ ! -f zImage ] && [ -f Image.gz ]; then
            ln -sf Image.gz zImage
          fi
          
          # Create anykernel.prop
          cat > anykernel.prop << 'AKPROP'
kernel.string=Z Flip 3 Kernel + KernelSU by wwyman94
kernel.for=SM-F7110
kernel.version=5.4.274-zflip3-kernelsu
kernel.miui.date=2026-06-15
kernel.miui.build=Android15
arch=arm64
codec=Image.gz-dtb
AKPROP
          
          # Build zip
          zip -r9 ../zflip3-kernelsu.zip . -x "*.git*"
          cd ..
          ls -lh zflip3-kernelsu.zip

      - name: Upload kernel artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zflip3-kernelsu-v15
          path: kernel/zflip3-kernelsu.zip
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-v15
          path: kernel/build.log
          retention-days: 7
