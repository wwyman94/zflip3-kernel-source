name: Build Z Flip 3 Kernel (KernelSU + DroidSpaces) - Fixed

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'KernelSU branch/tag (default: main)'
        required: false
        default: 'main'
      add_droidspaces:
        description: 'Enable DroidSpaces kernel options'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  KERNEL_SOURCE: wwyman94/zflip3-kernel-source
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu bc bison flex libssl-dev libelf-dev python3 python3-pip curl cpio rsync zip unzip dwarves git libncurses5-dev libncursesw5-dev xz-utils zstd clang lld llvm

      - name: Setup toolchains
        run: |
          mkdir -p /opt/toolchains
          cd /opt/toolchains
          
          echo "Setting up system Clang..."
          mkdir -p clang/bin
          ln -sf $(which clang) clang/bin/clang
          ln -sf $(which clang++) clang/bin/clang++
          ln -sf $(which llvm-ar) clang/bin/llvm-ar
          ln -sf $(which llvm-strip) clang/bin/llvm-strip
          
          echo "CLANG_PATH=/opt/toolchains/clang/bin" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
          
          clang --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/${{ env.KERNEL_SOURCE }}.git kernel
          cd kernel
          
          chmod +x scripts/*.sh 2>/dev/null || true
          chmod +x scripts/basic/fixdep 2>/dev/null || true
          
          echo "Patching signal.c to disable VDSO sigtramp..."
          sed -i 's/sigtramp = VDSO_SYMBOL(current->mm->context.vdso, sigtramp);/sigtramp = NULL; \/\/ Disabled VDSO/' arch/arm64/kernel/signal.c
          
          echo "Kernel version: $(make kernelversion)"

      - name: Integrate KernelSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ inputs.kernelsu_version }}"

      - name: Make defconfig
        run: |
          cd kernel
          
          # First make the base defconfig
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} CC=clang CLANG_TRIPLE=aarch64-linux-gnu- vendor/b2q_chn_openx_defconfig

      - name: Enable DroidSpaces kernel options
        if: inputs.add_droidspaces == 'true'
        run: |
          cd kernel
          # Enable DroidSpaces options directly in .config
          echo "CONFIG_SYSVIPC=y" >> .config
          echo "CONFIG_POSIX_MQUEUE=y" >> .config
          echo "CONFIG_NAMESPACES=y" >> .config
          echo "CONFIG_PID_NS=y" >> .config
          echo "CONFIG_IPC_NS=y" >> .config
          echo "CONFIG_UTS_NS=y" >> .config
          echo "CONFIG_USER_NS=y" >> .config
          echo "CONFIG_DEVTMPFS=y" >> .config
          echo "CONFIG_DEVTMPFS_MOUNT=y" >> .config
          echo "CONFIG_CGROUPS=y" >> .config
          echo "CONFIG_CGROUP_DEVICE=y" >> .config
          echo "CONFIG_CGROUP_PIDS=y" >> .config
          echo "CONFIG_MEMCG=y" >> .config
          echo "CONFIG_VETH=y" >> .config
          echo "CONFIG_ANDROID_BINDER_IPC=y" >> .config
          echo "CONFIG_ANDROID_BINDERFS=y" >> .config
          
          # Update config with new options
          make ARCH=${{ env.ARCH }} olddefconfig

      - name: Build kernel
        run: |
          cd kernel
          echo "Starting kernel build..."
          
          # Build with proper error handling
          set -o pipefail
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} CC=clang CLANG_TRIPLE=aarch64-linux-gnu- -j$(nproc) 2>&1 | tee build.log
          
          BUILD_STATUS=$?
          echo "Build exit code: $BUILD_STATUS"
          
          echo ""
          echo "=== Checking for kernel images ==="
          ls -la arch/arm64/boot/ 2>/dev/null || echo "boot directory not found"
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Build failed!"
            tail -200 build.log
            exit 1
          fi
          
          if [ -f arch/arm64/boot/Image.gz ]; then
            echo "Image.gz found!"
          elif [ -f arch/arm64/boot/Image ]; then
            echo "Image found!"
          else
            echo "No kernel image found!"
            tail -100 build.log
            exit 1
          fi

      - name: Package kernel
        run: |
          cd kernel
          
          KERNEL_IMG=""
          if [ -f arch/arm64/boot/Image.gz-dtb ]; then
            KERNEL_IMG="arch/arm64/boot/Image.gz-dtb"
          elif [ -f arch/arm64/boot/Image.gz ]; then
            KERNEL_IMG="arch/arm64/boot/Image.gz"
          elif [ -f arch/arm64/boot/Image ]; then
            KERNEL_IMG="arch/arm64/boot/Image"
          fi
          
          if [ -z "$KERNEL_IMG" ]; then
            echo "No kernel image found!"
            exit 1
          fi
          
          echo "Kernel image: $KERNEL_IMG"
          
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp "$KERNEL_IMG" AnyKernel3/
          cd AnyKernel3
          zip -r9 ../zflip3-kernelsu-droidspaces.zip ./*
          cd ..
          ls -la zflip3-kernelsu-droidspaces.zip

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: zflip3-kernelsu-droidspaces
          path: kernel/zflip3-kernelsu-droidspaces.zip
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log
          retention-days: 7