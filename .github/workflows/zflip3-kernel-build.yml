name: Build Z Flip 3 Kernel v14

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'KernelSU branch/tag'
        required: false
        default: 'main'

env:
  KERNEL_SOURCE: wwyman94/zflip3-kernel-source
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu bc bison flex libssl-dev libelf-dev \
            python3 python3-pip curl cpio rsync zip unzip dwarves git \
            libncurses5-dev libncursesw5-dev xz-utils zstd clang lld llvm

      - name: Setup toolchains
        run: |
          mkdir -p /opt/toolchains
          
          echo "Setting up system Clang..."
          mkdir -p clang/bin
          ln -sf $(which clang) clang/bin/clang
          ln -sf $(which clang++) clang/bin/clang++
          ln -sf $(which llvm-ar) clang/bin/llvm-ar
          ln -sf $(which llvm-strip) clang/bin/llvm-strip
          ln -sf $(which ld.lld) clang/bin/ld.lld
          
          echo "CLANG_PATH=/opt/toolchains/clang/bin" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
          
          clang --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/${{ env.KERNEL_SOURCE }}.git kernel
          cd kernel
          
          chmod +x scripts/*.sh 2>/dev/null || true
          chmod +x scripts/basic/fixdep 2>/dev/null || true
          
          echo "Kernel version: $(make kernelversion)"

      - name: Integrate KernelSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ inputs.kernelsu_version }}"

      - name: Make defconfig
        run: |
          cd kernel
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} CC=clang CLANG_TRIPLE=aarch64-linux-gnu- vendor/b2q_chn_openx_defconfig

      - name: Enable kernel options
        run: |
          cd kernel
          cat >> .config << 'EOF'
CONFIG_SYSVIPC=y
CONFIG_POSIX_MQUEUE=y
CONFIG_NAMESPACES=y
CONFIG_PID_NS=y
CONFIG_IPC_NS=y
CONFIG_UTS_NS=y
CONFIG_USER_NS=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_CGROUPS=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_PIDS=y
CONFIG_MEMCG=y
CONFIG_VETH=y
CONFIG_ANDROID_BINDER_IPC=y
CONFIG_ANDROID_BINDERFS=y
EOF
          make ARCH=${{ env.ARCH }} olddefconfig

      - name: Fix ftrace trace.h - CREATE SYMLINK
        run: |
          cd kernel
          
          echo "=== Fixing ftrace trace.h issue ==="
          
          # The ftrace system expects include/trace/trace.h to exist
          # kernel/sched/walt/trace.c includes <trace/define_trace.h>
          # define_trace.h then tries to include ./trace.h (relative to include/trace/)
          # So we need include/trace/trace.h -> kernel/sched/walt/trace.h
          
          mkdir -p include/trace
          
          # Check the actual include statement in define_trace.h
          echo "Checking include/trace/define_trace.h:"
          grep -n 'trace.h\|INCLUDE\|PATH\|FILE' include/trace/define_trace.h | head -20 || true
          
          # The define_trace.h uses: #include TRACE_INCLUDE_FILE
          # or: #include TRACE_INCLUDE_PATH/TRACE_INCLUDE_FILE
          # We need to make sure include/trace/trace.h points to the right place
          
          # Create symlink: include/trace/trace.h -> kernel/sched/walt/trace.h
          ln -sf ../../kernel/sched/walt/trace.h include/trace/trace.h
          
          echo "Created symlink: include/trace/trace.h -> ../../kernel/sched/walt/trace.h"
          ls -la include/trace/trace.h
          
          # Also create include/trace/events/walt.h stub
          mkdir -p include/trace/events
          if [ ! -f include/trace/events/walt.h ]; then
            cat > include/trace/events/walt.h << 'WALTHEADER'
#ifndef _TRACE_EVENTS_WALT_H
#define _TRACE_EVENTS_WALT_H

#include <linux/tracepoint.h>

TRACE_EVENT(walt_task_sleep,
    TP_PROTO(struct task_struct *p),
    TP_ARGS(p),
    TP_STRUCT__entry(
        __array(char, comm, TASK_COMM_LEN)
        __field(pid_t, pid)
    ),
    TP_fast_assign(
        memcpy(__entry->comm, p->comm, TASK_COMM_LEN);
        __entry->pid = p->pid;
    ),
    TP_printk("task: %s (%d)", __entry->comm, __entry->pid)
)

#endif /* _TRACE_EVENTS_WALT_H */
WALTHEADER
            echo "Created include/trace/events/walt.h stub"
          fi

      - name: Build kernel
        run: |
          cd kernel
          echo "Starting kernel build..."
          
          set -o pipefail
          
          make ARCH=${{ env.ARCH }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            -j$(nproc) 2>&1 | tee build.log
          
          BUILD_STATUS=$?
          echo "Build exit code: $BUILD_STATUS"
          
          echo ""
          echo "=== Checking for kernel images ==="
          ls -la arch/arm64/boot/ 2>/dev/null || echo "boot dir not found"
          find arch/arm64/boot -name "Image*" -type f 2>/dev/null || echo "No Image found"
          find . -name "*.ko" 2>/dev/null | head -5 || echo "No modules found"
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Build failed!"
            tail -200 build.log
            exit 1
          fi
          
          echo "Build completed successfully!"

      - name: Package kernel
        if: success()
        run: |
          cd kernel
          
          KERNEL_IMG=""
          for img in arch/arm64/boot/Image.gz-dtb arch/arm64/boot/Image.gz arch/arm64/boot/Image; do
            if [ -f "$img" ]; then
              KERNEL_IMG="$img"
              break
            fi
          done
          
          if [ -z "$KERNEL_IMG" ]; then
            echo "No kernel image found!"
            ls -la arch/arm64/boot/
            exit 1
          fi
          
          echo "Kernel image: $KERNEL_IMG"
          
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp "$KERNEL_IMG" AnyKernel3/
          cd AnyKernel3
          zip -r9 ../zflip3-kernelsu.zip ./*
          cd ..
          ls -la zflip3-kernelsu.zip

      - name: Upload kernel artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zflip3-kernelsu
          path: zflip3-kernelsu.zip
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log
          retention-days: 7
