name: Build Z Flip 3 Kernel (KernelSU + DroidSpaces)

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'KernelSU branch/tag (default: main)'
        required: false
        default: 'main'
      add_droidspaces:
        description: 'Enable DroidSpaces kernel options'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  KERNEL_SOURCE: wwyman94/zflip3-kernel-source
  DEFCONFIG: vendor/b2q_chn_openx_defconfig
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-
  CLANG_VERSION: r383902

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu-8 \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            python3 \
            python3-pip \
            curl \
            cpio \
            rsync \
            zip \
            unzip \
            dwarves \
            git

      - name: Setup Clang toolchain
        run: |
          echo "Downloading AOSP Clang $CLANG_VERSION..."
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-${CLANG_VERSION}.tar.gz" -o clang.tar.gz
          mkdir -p /opt/clang
          tar -xf clang.tar.gz -C /opt/clang
          echo "PATH=/opt/clang/bin:$PATH" >> $GITHUB_ENV
          ls /opt/clang/bin/ | head -5

      - name: Setup GCC cross-compiler
        run: |
          echo "Downloading AOSP GCC 4.9..."
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/master.tar.gz" -o gcc-aarch64.tar.gz
          mkdir -p /opt/gcc/aarch64
          tar -xf gcc-aarch64.tar.gz -C /opt/gcc/aarch64
          
          curl -L "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/master.tar.gz" -o gcc-arm.tar.gz
          mkdir -p /opt/gcc/arm
          tar -xf gcc-arm.tar.gz -C /opt/gcc/arm
          
          echo "CROSS_COMPILE=/opt/gcc/aarch64/bin/aarch64-linux-android-4.9-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=/opt/gcc/arm/bin/arm-linux-androideabi-4.9-" >> $GITHUB_ENV

      - name: Clone kernel source
        run: |
          echo "Cloning kernel source from $KERNEL_SOURCE..."
          git clone --depth=1 https://github.com/${{ env.KERNEL_SOURCE }}.git kernel
          cd kernel
          echo "Kernel version: $(make kernelversion)"
          echo "Files: $(find . -type f | wc -l)"
          echo "Defconfig exists: $(test -f arch/arm64/configs/${{ env.DEFCONFIG }} && echo YES || echo NO)"

      - name: Integrate KernelSU
        run: |
          cd kernel
          echo "Cloning KernelSU (branch: ${{ inputs.kernelsu_version }})..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ inputs.kernelsu_version }}"
          
          echo "KernelSU files added:"
          find drivers/kernelsu -type f 2>/dev/null | head -10 || echo "drivers/kernelsu not found"
          find fs/ksu -type f 2>/dev/null | head -10 || echo "fs/ksu not found"

      - name: Enable DroidSpaces kernel options
        if: inputs.add_droidspaces == 'true'
        run: |
          cd kernel
          echo "Adding DroidSpaces kernel config options to defconfig..."
          
          # DroidSpaces required configs
          cat >> arch/arm64/configs/${{ env.DEFCONFIG }} << 'EOF'
          
          # === DroidSpaces Support ===
          # IPC (required for container isolation)
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          
          # Namespaces (required for container isolation)
          CONFIG_NAMESPACES=y
          CONFIG_PID_NS=y
          CONFIG_IPC_NS=y
          CONFIG_UTS_NS=y
          CONFIG_USER_NS=y
          
          # devtmpfs (container device access)
          CONFIG_DEVTMPFS=y
          CONFIG_DEVTMPFS_MOUNT=y
          
          # cgroup (container resource management)
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_MEMCG=y
          
          # Network (Docker/NAT support)
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_REJECT=y
          CONFIG_NETFILTER_XT_TARGET_LOG=y
          CONFIG_NETFILTER_XT_MATCH_RECENT=y
          
          # Fail2ban support
          CONFIG_IP_SET=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_NETFILTER_XT_SET=y
          
          # tmpfs xattr (NixOS)
          CONFIG_TMPFS_XATTR=y
          
          # Veth (container networking)
          CONFIG_VETH=y
          
          # Android binder (container IPC)
          CONFIG_ANDROID_BINDER_IPC=y
          CONFIG_ANDROID_BINDERFS=y
          CONFIG_ANDROID_BINDER_DEVICES=""
          EOF
          
          echo "DroidSpaces config options added successfully"

      - name: Make defconfig
        run: |
          cd kernel
          echo "Generating kernel config from ${{ env.DEFCONFIG }}..."
          make ARCH=${{ env.ARCH }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            vendor/b2q_chn_openx_defconfig
          
          echo "Verifying KernelSU config..."
          grep -c "KSU" .config || echo "KSU not found in config"
          echo "Verifying DroidSpaces configs..."
          grep -c "SYSVIPC" .config || echo "SYSVIPC not found"
          grep -c "IPC_NS" .config || echo "IPC_NS not found"
          grep -c "CGROUPS" .config || echo "CGROUPS not found"

      - name: Build kernel
        run: |
          cd kernel
          echo "Building kernel (this may take 30-60 minutes)..."
          
          make ARCH=${{ env.ARCH }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            -j$(nproc) \
            2>&1 | tee build.log
          
          echo "Build exit code: $?"
          
          # Check if Image.gz-dtb exists
          if [ -f arch/arm64/boot/Image.gz ]; then
            echo "✅ Image.gz built successfully!"
            ls -la arch/arm64/boot/Image.gz
          elif [ -f arch/arm64/boot/Image.gz-dtb ]; then
            echo "✅ Image.gz-dtb built successfully!"
            ls -la arch/arm64/boot/Image.gz-dtb
          elif [ -f arch/arm64/boot/Image ]; then
            echo "✅ Image built successfully!"
            ls -la arch/arm64/boot/Image
          else
            echo "❌ Kernel image not found!"
            echo "Last 50 lines of build log:"
            tail -50 build.log
            exit 1
          fi

      - name: Package kernel
        run: |
          cd kernel
          
          # Find the kernel image
          KERNEL_IMG=""
          if [ -f arch/arm64/boot/Image.gz-dtb ]; then
            KERNEL_IMG="arch/arm64/boot/Image.gz-dtb"
          elif [ -f arch/arm64/boot/Image.gz ]; then
            KERNEL_IMG="arch/arm64/boot/Image.gz"
          elif [ -f arch/arm64/boot/Image ]; then
            KERNEL_IMG="arch/arm64/boot/Image"
          fi
          
          echo "Kernel image: $KERNEL_IMG"
          
          # Clone AnyKernel3 for packaging
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          # Copy kernel image
          cp "$KERNEL_IMG" AnyKernel3/
          
          # Edit AnyKernel3 info
          cd AnyKernel3
          sed -i "s/kernel.string=.*/kernel.string=Z Flip 3 KernelSU+DroidSpaces/" tools/ak3-core.sh
          sed -i "s/kernel.name=.*/kernel.name=zflip3-kernelsu-droidspaces/" tools/ak3-core.sh
          
          # Create zip
          zip -r9 ../zflip3-kernelsu-droidspaces.zip ./*
          cd ..
          
          echo "✅ Kernel packaged!"
          ls -la zflip3-kernelsu-droidspaces.zip

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: zflip3-kernelsu-droidspaces
          path: kernel/zflip3-kernelsu-droidspaces.zip
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log
          retention-days: 7