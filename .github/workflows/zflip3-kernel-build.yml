name: Build Z Flip 3 Kernel v12

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'KernelSU branch/tag'
        required: false
        default: 'main'

env:
  KERNEL_SOURCE: wwyman94/zflip3-kernel-source
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu bc bison flex libssl-dev libelf-dev \
            python3 python3-pip curl cpio rsync zip unzip dwarves git \
            libncurses5-dev libncursesw5-dev xz-utils zstd clang lld llvm

      - name: Setup toolchains
        run: |
          mkdir -p /opt/toolchains
          
          echo "Setting up system Clang..."
          mkdir -p clang/bin
          ln -sf $(which clang) clang/bin/clang
          ln -sf $(which clang++) clang/bin/clang++
          ln -sf $(which llvm-ar) clang/bin/llvm-ar
          ln -sf $(which llvm-strip) clang/bin/llvm-strip
          ln -sf $(which ld.lld) clang/bin/ld.lld
          
          echo "CLANG_PATH=/opt/toolchains/clang/bin" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
          
          clang --version

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/${{ env.KERNEL_SOURCE }}.git kernel
          cd kernel
          
          chmod +x scripts/*.sh 2>/dev/null || true
          chmod +x scripts/basic/fixdep 2>/dev/null || true
          
          echo "Kernel version: $(make kernelversion)"

      - name: Integrate KernelSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ inputs.kernelsu_version }}"

      - name: Make defconfig
        run: |
          cd kernel
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} CC=clang CLANG_TRIPLE=aarch64-linux-gnu- vendor/b2q_chn_openx_defconfig

      - name: Enable kernel options
        run: |
          cd kernel
          # Enable essential kernel options
          cat >> .config << 'EOF'
CONFIG_SYSVIPC=y
CONFIG_POSIX_MQUEUE=y
CONFIG_NAMESPACES=y
CONFIG_PID_NS=y
CONFIG_IPC_NS=y
CONFIG_UTS_NS=y
CONFIG_USER_NS=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_CGROUPS=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_PIDS=y
CONFIG_MEMCG=y
CONFIG_VETH=y
CONFIG_ANDROID_BINDER_IPC=y
CONFIG_ANDROID_BINDERFS=y
EOF
          make ARCH=${{ env.ARCH }} olddefconfig

      - name: Pre-build ftrace setup
        run: |
          cd kernel
          
          # Generate trace headers before main build
          # This creates kernel/sched/walt/trace.h if needed
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} CC=clang CLANG_TRIPLE=aarch64-linux-gnu- headers_install
          
          # Check if walt trace.h exists, if not create stub
          if [ ! -f kernel/sched/walt/trace.h ]; then
            echo "Creating stub trace.h for walt..."
            mkdir -p kernel/sched/walt
            cat > kernel/sched/walt/trace.h << 'TRACEHDR'
#ifndef WALT_TRACE_H
#define WALT_TRACE_H

#include <trace/define_trace.h>

#define TRACE_INCLUDE_FILE
#undef TRACE_SYSTEM
#define TRACE_SYSTEM walt

#endif /* WALT_TRACE_H */
TRACEHDR
          fi
          
          ls -la kernel/sched/walt/trace.h 2>/dev/null || echo "trace.h not found"

      - name: Build kernel
        run: |
          cd kernel
          echo "Starting kernel build..."
          
          set -o pipefail
          
          # Build with proper error handling
          make ARCH=${{ env.ARCH }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            -j$(nproc) 2>&1 | tee build.log
          
          BUILD_STATUS=$?
          echo "Build exit code: $BUILD_STATUS"
          
          echo ""
          echo "=== Checking for kernel images ==="
          ls -la arch/arm64/boot/ 2>/dev/null || echo "boot directory not found"
          find arch/arm64/boot -name "Image*" -type f 2>/dev/null || echo "No Image found"
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Build failed!"
            tail -100 build.log
            exit 1
          fi
          
          echo "Build completed successfully!"

      - name: Package kernel
        if: success()
        run: |
          cd kernel
          
          KERNEL_IMG=""
          for img in arch/arm64/boot/Image.gz-dtb arch/arm64/boot/Image.gz arch/arm64/boot/Image; do
            if [ -f "$img" ]; then
              KERNEL_IMG="$img"
              break
            fi
          done
          
          if [ -z "$KERNEL_IMG" ]; then
            echo "No kernel image found!"
            ls -la arch/arm64/boot/
            exit 1
          fi
          
          echo "Kernel image: $KERNEL_IMG"
          
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp "$KERNEL_IMG" AnyKernel3/
          cd AnyKernel3
          zip -r9 ../zflip3-kernelsu.zip ./*
          cd ..
          ls -la zflip3-kernelsu.zip

      - name: Upload kernel artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zflip3-kernelsu
          path: kernel/zflip3-kernelsu.zip
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log
          retention-days: 7